<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ATEMA Video Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --a-bg: #0b0b0b;
        --a-surface: #141414;
        --a-surface-alt: #1c1c1c;
        --a-heading: #efe3d1;
        --a-text: #d8cdb9;
        --a-muted: rgba(216, 205, 185, 0.68);
        --a-faint: rgba(216, 205, 185, 0.42);
        --a-gold: #d4af7a;
        --a-gold-deep: #bb864b;
        --a-border: rgba(212, 175, 122, 0.16);
        --a-border-strong: rgba(212, 175, 122, 0.34);
        --a-shadow: rgba(0, 0, 0, 0.38);
        --a-danger: #df9b7f;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--a-bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        background:
          linear-gradient(135deg, rgba(212, 175, 122, 0.09), transparent 34rem),
          radial-gradient(circle at 88% 12%, rgba(187, 134, 75, 0.11), transparent 22rem),
          var(--a-bg);
        color: var(--a-text);
        font-family: Tajawal, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1680px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(16px, 2vw, 28px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
        gap: clamp(16px, 2vw, 28px);
      }

      .stage {
        min-width: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 18px;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 2px 2px 0;
      }

      .brand {
        min-width: 0;
      }

      .wordmark {
        margin: 0;
        color: var(--a-heading);
        font-family: "Amiri", serif;
        font-size: clamp(2rem, 4vw, 4.6rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--a-muted);
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.05rem, 1.5vw, 1.45rem);
        line-height: 1.25;
      }

      .meter {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--a-heading);
        direction: ltr;
      }

      .meter span {
        display: inline-flex;
        min-width: 42px;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--a-border);
        background: rgba(20, 20, 20, 0.74);
        color: var(--a-gold);
        font-variant-numeric: tabular-nums;
      }

      .player-wrap {
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(280px, 1fr) auto;
        overflow: hidden;
        border: 1px solid var(--a-border);
        background: rgba(10, 10, 10, 0.72);
        box-shadow: 0 24px 80px var(--a-shadow);
      }

      .video-frame {
        position: relative;
        min-height: 0;
        background: #050505;
        display: grid;
        place-items: center;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        max-height: calc(100vh - 190px);
        object-fit: contain;
        background: #050505;
      }

      .status {
        position: absolute;
        inset: auto 18px 18px auto;
        max-width: min(520px, calc(100% - 36px));
        padding: 10px 12px;
        border: 1px solid var(--a-border);
        background: rgba(11, 11, 11, 0.78);
        color: var(--a-text);
        backdrop-filter: blur(16px);
        line-height: 1.55;
      }

      .status:empty {
        display: none;
      }

      .player-info {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        padding: 18px;
        border-top: 1px solid var(--a-border);
        background: rgba(20, 20, 20, 0.92);
      }

      .current-title {
        margin: 0;
        color: var(--a-heading);
        font-family: "Cormorant Garamond", "Amiri", serif;
        font-size: clamp(1.5rem, 2.2vw, 2.35rem);
        font-weight: 600;
        line-height: 1.05;
        direction: ltr;
      }

      .meta-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 9px;
        color: var(--a-muted);
        direction: ltr;
        font-size: 0.94rem;
        line-height: 1.35;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 4px 9px;
        border: 1px solid var(--a-border);
        background: rgba(212, 175, 122, 0.08);
        color: var(--a-text);
        font-variant-numeric: tabular-nums;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: end;
        gap: 8px;
        direction: ltr;
      }

      .icon-button,
      .text-button,
      .quality-select {
        min-width: 44px;
        min-height: 44px;
        border: 1px solid var(--a-border);
        background: rgba(11, 11, 11, 0.52);
        color: var(--a-heading);
        transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
      }

      .icon-button {
        width: 44px;
        display: inline-grid;
        place-items: center;
        padding: 0;
      }

      .text-button {
        padding: 0 14px;
      }

      .quality-select {
        width: 118px;
        padding: 0 12px;
        direction: ltr;
        outline: none;
      }

      .icon-button:hover,
      .text-button:hover,
      .quality-select:hover,
      .quality-select:focus,
      .icon-button[aria-pressed="true"],
      .text-button[aria-pressed="true"] {
        border-color: var(--a-border-strong);
        background: rgba(212, 175, 122, 0.12);
        color: var(--a-gold);
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sidebar {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 14px;
        padding: 16px;
        border: 1px solid var(--a-border);
        background: rgba(20, 20, 20, 0.82);
        box-shadow: 0 24px 80px var(--a-shadow);
      }

      .tools {
        display: grid;
        gap: 10px;
      }

      .search {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--a-border);
        background: rgba(11, 11, 11, 0.6);
        color: var(--a-heading);
        direction: ltr;
        padding: 0 12px;
        outline: none;
      }

      .search:focus {
        border-color: var(--a-border-strong);
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        direction: ltr;
      }

      .filter {
        min-height: 38px;
        border: 1px solid var(--a-border);
        background: rgba(11, 11, 11, 0.46);
        color: var(--a-muted);
      }

      .filter[aria-pressed="true"] {
        border-color: var(--a-border-strong);
        background: rgba(212, 175, 122, 0.12);
        color: var(--a-gold);
      }

      .list-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 2px;
      }

      .list-title {
        margin: 0;
        color: var(--a-heading);
        font-family: "Amiri", serif;
        font-size: 1.35rem;
        line-height: 1;
      }

      .count {
        color: var(--a-muted);
        direction: ltr;
        font-size: 0.92rem;
        font-variant-numeric: tabular-nums;
      }

      .playlist {
        min-height: 0;
        overflow: auto;
        padding-left: 4px;
        display: grid;
        align-content: start;
        gap: 8px;
        scrollbar-color: var(--a-gold-deep) transparent;
      }

      .item {
        width: 100%;
        min-height: 74px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 10px;
        border: 1px solid transparent;
        background: rgba(11, 11, 11, 0.28);
        color: inherit;
        text-align: start;
      }

      .item:hover,
      .item[aria-current="true"] {
        border-color: var(--a-border-strong);
        background: rgba(212, 175, 122, 0.1);
      }

      .index {
        width: 38px;
        height: 38px;
        display: inline-grid;
        place-items: center;
        border: 1px solid var(--a-border);
        color: var(--a-gold);
        font-variant-numeric: tabular-nums;
      }

      .item-name {
        display: block;
        overflow-wrap: anywhere;
        color: var(--a-heading);
        direction: ltr;
        line-height: 1.25;
      }

      .item-meta {
        display: block;
        margin-top: 6px;
        color: var(--a-muted);
        direction: ltr;
        font-size: 0.86rem;
        font-variant-numeric: tabular-nums;
      }

      .format {
        min-width: 48px;
        padding: 5px 7px;
        border: 1px solid var(--a-border);
        color: var(--a-muted);
        text-align: center;
        font-size: 0.78rem;
        letter-spacing: 0;
      }

      .empty {
        display: none;
        padding: 28px 16px;
        border: 1px solid var(--a-border);
        color: var(--a-muted);
        text-align: center;
      }

      .empty[data-visible="true"] {
        display: block;
      }

      @media (max-width: 980px) {
        .shell {
          min-height: 100vh;
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: 420px;
        }

        .topbar,
        .player-info {
          align-items: start;
          grid-template-columns: 1fr;
          flex-direction: column;
        }

        .player-info {
          display: grid;
        }

        .controls {
          width: 100%;
          justify-content: start;
          flex-wrap: wrap;
        }

        video {
          max-height: 64vh;
        }
      }

      @media (max-width: 560px) {
        .shell {
          padding: 10px;
          gap: 12px;
        }

        .topbar {
          gap: 10px;
        }

        .meter {
          width: 100%;
          justify-content: space-between;
        }

        .filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .player-info,
        .sidebar {
          padding: 12px;
        }

        .item {
          grid-template-columns: auto minmax(0, 1fr);
        }

        .format {
          grid-column: 2;
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Video player">
        <header class="topbar">
          <div class="brand">
            <h1 class="wordmark">مراجعة الفيديو</h1>
            <p class="subtitle">ATEMA Studio motion review</p>
          </div>
          <div class="meter" aria-label="Playlist position">
            <span id="currentNumber">01</span>
            <span id="totalNumber">19</span>
          </div>
        </header>

        <section class="player-wrap">
          <div class="video-frame">
            <video id="player" controls playsinline preload="metadata"></video>
            <div class="status" id="status" role="status"></div>
          </div>
          <footer class="player-info">
            <div>
              <h2 class="current-title" id="currentTitle"></h2>
              <div class="meta-line" id="currentMeta"></div>
            </div>
            <div class="controls" aria-label="Playback controls">
              <button class="icon-button" id="prevBtn" type="button" aria-label="Previous video">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 20 9 12l10-8v16Z" /><path d="M5 19V5" /></svg>
              </button>
              <button class="icon-button" id="nextBtn" type="button" aria-label="Next video">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 4 10 8-10 8V4Z" /><path d="M19 5v14" /></svg>
              </button>
              <button class="text-button" id="muteBtn" type="button" aria-pressed="false">Mute</button>
              <button class="text-button" id="loopBtn" type="button" aria-pressed="false">Loop</button>
              <select class="quality-select" id="qualitySelect" aria-label="Playback quality">
                <option value="auto">Auto</option>
              </select>
            </div>
          </footer>
        </section>
      </section>

      <aside class="sidebar" aria-label="Video playlist">
        <div class="tools">
          <input class="search" id="search" type="search" placeholder="Search videos" autocomplete="off" />
          <div class="filters" role="group" aria-label="Video filters">
            <button class="filter" type="button" data-filter="all" aria-pressed="true">All</button>
            <button class="filter" type="button" data-filter="mp4" aria-pressed="false">MP4</button>
            <button class="filter" type="button" data-filter="mov" aria-pressed="false">MOV</button>
            <button class="filter" type="button" data-filter="large" aria-pressed="false">Large</button>
          </div>
        </div>

        <div class="list-head">
          <h2 class="list-title">المقاطع</h2>
          <span class="count" id="visibleCount"></span>
        </div>

        <div class="playlist" id="playlist"></div>
        <div class="empty" id="empty">No matching videos.</div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
    <script type="module" src="video-review.js"></script>
  </body>
</html>
