name: Deploy to GitHub Pages

# Builds the Vite bundle and publishes `dist/` to the `gh-pages` branch on
# every push to master. Replaces the manual `npm run deploy` from Fatima's
# laptop. Tests are the gate — a failing suite blocks the deploy.

on:
  push:
    branches: [master]
  workflow_dispatch:

# One deploy at a time; if a second push lands while the first is running,
# queue the second (don't cancel) so we never publish stale dist contents.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to push to gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check + build
        env:
          # Vite bakes these into the JS bundle at build time. Without
          # them src/services/supabase.ts evaluates to `supabase = null`
          # and the entire booking flow silently mock-modes — no Edge
          # Function call, no insert, no admin visibility. These MUST
          # be set as GitHub Actions repository secrets, mirroring the
          # local .env you use on your laptop.
          VITE_SUPABASE_URL:            ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:       ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Optional — Moyasar live publishable key. If unset the
          # booking flow falls back to the bank-transfer path only.
          VITE_MOYASAR_PUBLISHABLE_KEY: ${{ secrets.VITE_MOYASAR_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY is unset."
            echo "::error::Without these, the customer-facing bundle ships in mock-only mode"
            echo "::error::— no real bookings get written. Set them in Settings → Secrets"
            echo "::error::and re-run the deploy."
            exit 1
          fi
          if [ -z "${VITE_MOYASAR_PUBLISHABLE_KEY:-}" ]; then
            echo "::warning::VITE_MOYASAR_PUBLISHABLE_KEY is unset — the deployed site"
            echo "::warning::cannot take card payments; customers see the WhatsApp"
            echo "::warning::hand-off notice instead. Set the repository secret to enable cards."
          fi
          npm run build

      - name: Verify Supabase URL was baked into the bundle
        # Defence-in-depth: if Vite silently dropped the env (e.g. wrong
        # variable name, build cache, terser stripping), fail loudly
        # BEFORE publishing to gh-pages so we never ship a mock-only
        # bundle to atemastudio.xyz again.
        run: |
          if ! grep -q "${VITE_SUPABASE_URL}" dist/assets/*.js; then
            echo "::error::Built bundle does not contain the configured Supabase URL."
            echo "::error::Vite did not bake VITE_SUPABASE_URL into the JS. Refusing to publish."
            exit 1
          fi
          echo "::notice::Supabase URL confirmed in bundle."
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Publish dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # CNAME comes from public/CNAME via the build — don't override here.
          # commit_message defaults to the source commit message, which is
          # what we want.
