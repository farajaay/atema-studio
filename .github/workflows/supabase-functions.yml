name: Supabase — deploy Edge Functions

# Deploys every Edge Function under supabase/functions/ to the linked
# project. Fires automatically when function source changes on master,
# and is also available as a manual button so you can redeploy without
# a code change (useful after rotating a Supabase secret).
#
# Required GitHub Actions repository secrets:
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF
#
# Functions are deployed sequentially. A failure on any one stops the
# job — easier to debug than partial rollouts.

on:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be set as repo secrets."
            exit 1
          fi

          # Every direct child of supabase/functions/ that has an index.ts
          # is a deployable function. _shared/ holds modules, not a fn.
          mapfile -t FUNCTIONS < <(
            find supabase/functions -mindepth 2 -maxdepth 2 -name index.ts \
              | sed -E 's|supabase/functions/||; s|/index\.ts$||' \
              | grep -v '^_' \
              | sort
          )

          if [ ${#FUNCTIONS[@]} -eq 0 ]; then
            echo "::warning::No deployable functions found under supabase/functions/."
            exit 0
          fi

          echo "Deploying ${#FUNCTIONS[@]} function(s) to ${SUPABASE_PROJECT_REF}:"
          printf '  - %s\n' "${FUNCTIONS[@]}"

          for fn in "${FUNCTIONS[@]}"; do
            echo "::group::deploy $fn"
            supabase functions deploy "$fn" --project-ref "${SUPABASE_PROJECT_REF}"
            echo "::endgroup::"
          done

          echo "::notice::Deployed ${#FUNCTIONS[@]} Edge Function(s)."
