name: Supabase — set secrets

# Pushes the studio's secrets from GitHub Actions secrets into the
# Supabase project, where Edge Functions read them at runtime.
#
# Secrets NEVER touch the repo or the workflow logs. The runner reads
# them from GitHub's encrypted secret store, hands them to the Supabase
# CLI as positional args, and the CLI uploads them to Supabase's
# encrypted secret store. We only print the *names* that were set.
#
# Manually-triggered only — running it accidentally is a no-op against
# already-set values, but there's no good reason to fire it on every push.
#
# Required GitHub Actions repository secrets (Settings → Secrets and
# variables → Actions → New repository secret):
#
#   SUPABASE_ACCESS_TOKEN     (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF      the 20-char project id from the dashboard URL
#
# Optional secrets — any of these that are set get pushed; unset ones
# are silently skipped, so you can roll the integration out one at a time:
#
#   ZOHO_SMTP_HOST · ZOHO_SMTP_PORT · ZOHO_SMTP_USER · ZOHO_SMTP_PASSWORD
#   ZOHO_SMTP_FROM_NAME · ZOHO_SMTP_FROM
#   SITE_ORIGIN
#   META_WA_TOKEN · META_WA_PHONE_NUMBER_ID · META_WA_VERIFY_TOKEN · META_WA_APP_SECRET
#   OWNER_WA_NUMBER
#   ANTHROPIC_API_KEY
#   CRON_SECRET

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry-run — list which secrets would be set, do not push'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push secrets to Supabase
        env:
          SUPABASE_ACCESS_TOKEN:   ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:    ${{ secrets.SUPABASE_PROJECT_REF }}
          # Mail
          ZOHO_SMTP_HOST:          ${{ secrets.ZOHO_SMTP_HOST }}
          ZOHO_SMTP_PORT:          ${{ secrets.ZOHO_SMTP_PORT }}
          ZOHO_SMTP_USER:          ${{ secrets.ZOHO_SMTP_USER }}
          ZOHO_SMTP_PASSWORD:      ${{ secrets.ZOHO_SMTP_PASSWORD }}
          ZOHO_SMTP_FROM_NAME:     ${{ secrets.ZOHO_SMTP_FROM_NAME }}
          ZOHO_SMTP_FROM:          ${{ secrets.ZOHO_SMTP_FROM }}
          # Site
          SITE_ORIGIN:             ${{ secrets.SITE_ORIGIN }}
          # Meta WhatsApp Cloud
          META_WA_TOKEN:           ${{ secrets.META_WA_TOKEN }}
          META_WA_PHONE_NUMBER_ID: ${{ secrets.META_WA_PHONE_NUMBER_ID }}
          META_WA_VERIFY_TOKEN:    ${{ secrets.META_WA_VERIFY_TOKEN }}
          META_WA_APP_SECRET:      ${{ secrets.META_WA_APP_SECRET }}
          OWNER_WA_NUMBER:         ${{ secrets.OWNER_WA_NUMBER }}
          # AI + cron
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET:             ${{ secrets.CRON_SECRET }}
          DRY_RUN:                 ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be set as repo secrets."
            exit 1
          fi

          # Collect only the secrets that were provided. Empty ones are
          # silently skipped so partial roll-outs work.
          args=()
          names=()
          add() {
            local key="$1" val="${!1:-}"
            if [ -n "$val" ]; then
              args+=("$key=$val")
              names+=("$key")
            fi
          }

          for key in \
            ZOHO_SMTP_HOST ZOHO_SMTP_PORT ZOHO_SMTP_USER ZOHO_SMTP_PASSWORD \
            ZOHO_SMTP_FROM_NAME ZOHO_SMTP_FROM \
            SITE_ORIGIN \
            META_WA_TOKEN META_WA_PHONE_NUMBER_ID META_WA_VERIFY_TOKEN META_WA_APP_SECRET \
            OWNER_WA_NUMBER \
            ANTHROPIC_API_KEY CRON_SECRET ; do
            add "$key"
          done

          if [ ${#args[@]} -eq 0 ]; then
            echo "::warning::No secrets supplied — nothing to push."
            exit 0
          fi

          echo "About to set ${#args[@]} secret(s) on Supabase project ${SUPABASE_PROJECT_REF}:"
          printf '  - %s\n' "${names[@]}"

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "::notice::Dry-run mode — no secrets pushed."
            exit 0
          fi

          # `supabase secrets set KEY=VALUE …` — values come from the
          # env-substituted array, never echoed.
          supabase secrets set "${args[@]}" --project-ref "${SUPABASE_PROJECT_REF}"

          echo "::notice::Pushed ${#args[@]} secret(s) to Supabase."
