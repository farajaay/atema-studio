name: Supabase — apply SQL migrations

# Runs every database/migrations-*.sql file against the linked Supabase
# project, in alphabetical order, via the Supabase Management API. Auth
# uses the same SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF secrets the
# other Supabase workflows use — no new credential required.
#
# Manual trigger only. We deliberately do NOT auto-fire on a `database/`
# push because applying SQL to production should always be a deliberate
# click. Choose to also include seeds with the `include-seeds` input.
#
# Safety: every file in database/migrations-*.sql is idempotent by
# convention (CREATE … IF NOT EXISTS / ALTER … ADD COLUMN IF NOT EXISTS /
# CREATE OR REPLACE …) and every seed is UPSERT-by-stable-id, so
# re-running this workflow on an already-applied schema is a no-op. We
# also skip `database/schema.sql` and the superseded portfolio seed.

on:
  workflow_dispatch:
    inputs:
      include-seeds:
        description: 'Also re-run seeds (UPSERT by id — safe to re-apply)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      only-file:
        description: 'Optional: just one file (e.g. migrations-2026-05-email.sql). Blank = all.'
        required: false
        default: ''
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
          INCLUDE_SEEDS:         ${{ inputs.include-seeds }}
          ONLY_FILE:             ${{ inputs.only-file }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be set as repo secrets."
            exit 1
          fi

          # ─── Collect files ──────────────────────────────────────────────
          files=()
          if [ -n "${ONLY_FILE:-}" ]; then
            # User requested one specific file
            f="database/${ONLY_FILE}"
            if [ ! -f "$f" ]; then
              echo "::error::File not found: $f"
              exit 1
            fi
            files=("$f")
          else
            # Every migration file, alphabetical
            shopt -s nullglob
            for f in database/migrations-*.sql; do
              files+=("$f")
            done
            if [ "${INCLUDE_SEEDS:-false}" = "true" ]; then
              for f in database/seed-*.sql; do
                # Skip the superseded portfolio seed
                if [[ "$f" == *"seed-portfolio-2026-05.sql" ]]; then
                  echo "Skipping superseded $f (use seed-portfolio-2026-05-expanded.sql instead)"
                  continue
                fi
                files+=("$f")
              done
            fi
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No SQL files matched — nothing to apply."
            exit 0
          fi

          echo "Will apply ${#files[@]} file(s) to project ${SUPABASE_PROJECT_REF}:"
          printf '  - %s\n' "${files[@]}"

          # ─── Apply each via Management API ──────────────────────────────
          api="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          failed=0
          for f in "${files[@]}"; do
            echo "::group::apply $f"
            # jq -Rs reads the whole file as a single JSON-encoded string,
            # so multi-line / quote-laden SQL stays safe through curl.
            payload=$(jq -Rs '{query: .}' < "$f")
            response_file=$(mktemp)
            http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary "@-" \
              "$api" <<<"$payload" || echo "000")

            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "✓ $f"
            else
              echo "::error file=$f::HTTP $http_code"
              echo "Response body:"
              cat "$response_file"
              echo ""
              failed=$((failed + 1))
            fi
            rm -f "$response_file"
            echo "::endgroup::"
          done

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed file(s) failed to apply."
            exit 1
          fi

          echo "::notice::Applied ${#files[@]} SQL file(s) successfully."
