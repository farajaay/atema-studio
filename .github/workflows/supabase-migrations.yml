name: Supabase — apply SQL migrations

# Applies the studio's SQL files to the linked Supabase project via the
# Management API. Files run in an **explicit dependency order** (not
# alphabetical) — see the FILES array below. Re-running is a no-op
# because every migration is idempotent by convention.
#
# Manual trigger only. We deliberately do NOT auto-fire on a `database/`
# push because applying SQL to production should always be a deliberate
# click. Choose to also include seeds with the `include-seeds` input.
#
# Why an explicit manifest (not a glob):
#   • Alphabetical sort puts `migrations-2026-05.sql` LAST (because
#     `-` < `.` in ASCII), which is the inverse of its purpose — it's
#     supposed to be the first file applied after schema.sql.
#   • `-booking-changes-otp.sql` sorts before `-booking-changes.sql` for
#     the same reason, even though the OTP file depends on it.
#   • `-audit-patches.sql` sorts FIRST but depends on rls-hardening,
#     moodboard, discount-codes — so its H-6/H-7/H-9 fixes were silently
#     skipped on every run.
#
# Files intentionally NOT applied here:
#   • database/schema.sql        — base schema, run once manually
#   • database/admin-setup.sql   — not idempotent (no DROP POLICY guards)
#   • database/seed-portfolio-2026-05.sql — superseded by the expanded seed

on:
  workflow_dispatch:
    inputs:
      include-seeds:
        description: 'Also re-run seeds (UPSERT by id — safe to re-apply)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      only-file:
        description: 'Optional: just one file (e.g. migrations-2026-05-email.sql). Blank = full ordered run.'
        required: false
        default: ''
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
          INCLUDE_SEEDS:         ${{ inputs.include-seeds }}
          ONLY_FILE:             ${{ inputs.only-file }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be set as repo secrets."
            exit 1
          fi

          # ─── Explicit ordered manifest (dependency-aware) ───────────────
          # Each block notes WHY a file sits where it does. Editing the
          # order without re-reading these notes is a foot-gun.
          MIGRATIONS=(
            # ── 1. Foundation tables that everything else references ────
            "database/app-settings.sql"                                # app_settings singleton (branding.sql needs it)
            "database/migrations-2026-05.sql"                          # vat_enabled column on bookings + blocked_dates table

            # ── 2. RLS + public view foundation ─────────────────────────
            "database/migrations-2026-05-rls-hardening.sql"            # public_booked_dates view + constrained policies
            "database/migrations-2026-05-bookings-rls-fix.sql"         # follow-up policy patches that reference rls-hardening

            # ── 3. Schema features (mostly independent of each other) ───
            "database/migrations-2026-05-branding.sql"                 # columns on app_settings / journal_posts / portfolio_items
            "database/migrations-2026-05-custom-domain.sql"            # photo URL rewrite
            "database/migrations-2026-05-features-en-backfill.sql"     # packages.features_en column + backfill
            "database/migrations-2026-05-email.sql"                    # email_messages audit table
            "database/migrations-2026-05-wa.sql"                       # wa_messages + wa_reminders_sent
            "database/migrations-2026-05-moodboard.sql"                # mood_boards table + RPC
            "database/migrations-2026-05-editing-tiers.sql"            # ADD COLUMN editorial_photos + rewrite features text
            "database/migrations-2026-05-pricing-overhaul.sql"         # update prices to margin model; deactivates old Customise (id=2)
            "database/migrations-2026-05-custom-base.sql"              # ADD COLUMN is_custom_base; re-activates id=2 as Custom Foundation
            "database/migrations-2026-05-included-addons.sql"          # declares bundled add-ons per package (included_addon_ids)
            "database/migrations-2026-05-journal-additions.sql"        # two new journal essays (entries 7 & 8)

            # ── 4. Discount codes (must precede launch-code seed + audit H-7) ──
            "database/migrations-2026-05-discount-codes.sql"           # discount_codes table + preview/redeem RPCs
            "database/migrations-2026-05-launch-code.sql"              # LAUNCH15 seed (INSERTs into discount_codes)

            # ── 5. Customer self-service (booking-changes BEFORE its OTP) ──
            "database/migrations-2026-05-booking-changes.sql"          # manage_token, reschedule_count, booking_changes
            "database/migrations-2026-05-booking-changes-otp.sql"      # booking_otps (FK to bookings)

            # ── 6. Repair pass ─────────────────────────────────────────
            "database/migrations-2026-05-repair-audit.sql"             # addons schema repair

            # ── 7. Cross-cutting audit patches LAST ────────────────────
            # H-6/H-7/H-9 reference mood_boards, discount_codes,
            # public_booked_dates — all must already exist for the
            # do-block guards to fire instead of silently skipping.
            "database/migrations-2026-05-audit-patches.sql"

            # ── 8. June 2026 additions ──────────────────────────────
            "database/migrations-2026-06-topup.sql"             # topup_amount_due on bookings (post-upgrade payment)
            "database/migrations-2026-06-feature-flags.sql"     # wa_enabled + payment_*_enabled on app_settings
            "database/migrations-2026-06-rls-remaining.sql"     # enable RLS on packages, addons, payments, whatsapp_logs
            "database/migrations-2026-06-documents.sql"         # contracts + invoices DDL under version control + admin-only SELECT
          )

          SEEDS=(
            # No inter-seed dependencies; order is cosmetic. Packages
            # first because it's the revenue-critical one (new prices).
            "database/seed-packages-2026-05.sql"
            "database/seed-portfolio-2026-05-expanded.sql"
            "database/seed-journal-2026-05.sql"
          )

          # ─── Build the list of files to apply ───────────────────────────
          files=()
          if [ -n "${ONLY_FILE:-}" ]; then
            # User requested one specific file — accept any path that
            # exists under database/, regardless of order/manifest.
            f="database/${ONLY_FILE}"
            if [ ! -f "$f" ]; then
              echo "::error::File not found: $f"
              exit 1
            fi
            files=("$f")
          else
            for f in "${MIGRATIONS[@]}"; do
              if [ ! -f "$f" ]; then
                echo "::error::Manifest references missing file: $f"
                exit 1
              fi
              files+=("$f")
            done
            if [ "${INCLUDE_SEEDS:-false}" = "true" ]; then
              for f in "${SEEDS[@]}"; do
                if [ ! -f "$f" ]; then
                  echo "::error::Seed manifest references missing file: $f"
                  exit 1
                fi
                files+=("$f")
              done
            fi

            # Sanity check: warn if a new migration was added to the repo
            # but not to the manifest above. Better to be loud than to
            # silently skip a migration.
            for f in database/migrations-*.sql; do
              hit=0
              for m in "${MIGRATIONS[@]}"; do
                if [ "$f" = "$m" ]; then hit=1; break; fi
              done
              if [ "$hit" -eq 0 ]; then
                echo "::warning::Migration on disk but not in manifest: $f (skipping — add it to MIGRATIONS)"
              fi
            done
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No SQL files matched — nothing to apply."
            exit 0
          fi

          echo "Will apply ${#files[@]} file(s) to project ${SUPABASE_PROJECT_REF}:"
          printf '  - %s\n' "${files[@]}"

          # ─── Apply each via Management API ──────────────────────────────
          api="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          failed=0
          for f in "${files[@]}"; do
            echo "::group::apply $f"
            # jq -Rs reads the whole file as a single JSON-encoded string,
            # then we wrap it as { query, read_only:false }. The read_only
            # flag is required when the SQL contains DDL (CREATE TABLE etc.)
            # — Supabase rejects DDL in the default read-only mode with 400.
            payload=$(jq -Rs '{query: ., read_only: false}' < "$f")
            response_file=$(mktemp)
            http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary "@-" \
              "$api" <<<"$payload" || echo "000")

            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "✓ $f (HTTP $http_code)"
            else
              echo "::error file=$f::HTTP $http_code"
              echo "──────── Request ────────"
              echo "POST $api"
              echo "Payload size: $(wc -c < <(echo "$payload")) bytes"
              echo "First 200 chars of SQL: $(head -c 200 "$f")"
              echo "──────── Response ────────"
              if [ -s "$response_file" ]; then
                # Pretty-print if it's JSON, else raw
                if jq -e . "$response_file" >/dev/null 2>&1; then
                  jq . "$response_file"
                else
                  cat "$response_file"
                fi
              else
                echo "(empty response body)"
              fi
              echo ""
              failed=$((failed + 1))
            fi
            rm -f "$response_file"
            echo "::endgroup::"
          done

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed file(s) failed to apply."
            exit 1
          fi

          echo "::notice::Applied ${#files[@]} SQL file(s) successfully."
