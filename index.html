<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATEMA STUDIO — جلسات تصوير احترافية في الجبيل</title>
    <meta name="description" content="ATEMA Studio — جلسات تصوير احترافية للأفراح والمناسبات في الجبيل والمنطقة الشرقية." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { margin: 0; background: #F5EDE4; overflow-x: hidden; }
      #root { min-height: 100vh; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #EDE4D8; }
      ::-webkit-scrollbar-thumb { background: #D6BFA3; border-radius: 2px; }

      /* ── Wordmark shimmer ── */
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      .atema-wordmark {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        letter-spacing: 0.38em;
        text-transform: uppercase;
        background: linear-gradient(90deg, #1A1A1A 20%, #8C6B4F 45%, #1A1A1A 70%);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 5s linear infinite;
        line-height: 1;
      }
      .atema-sub {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        letter-spacing: 0.55em;
        text-transform: uppercase;
        font-size: 0.6rem;
        color: rgba(26,26,26,0.4);
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .fade-up { animation: fadeUp 0.55s ease both; }

      /* ── Package card photo area ── */
      .pkg-photo {
        width: 100%; height: 200px;
        object-fit: cover;
        filter: sepia(6%) saturate(90%) brightness(1.02);
        transition: transform 0.7s ease;
      }
      .pkg-card-wrap:hover .pkg-photo { transform: scale(1.05); }

      /* ── Pkg card hover ── */
      .pkg-card-wrap {
        transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94),
                    box-shadow 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      .pkg-card-wrap:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 56px rgba(61,46,31,0.13) !important;
      }

      /* ── Glass ── */
      .glass {
        background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(245,237,228,0.92));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(214,191,163,0.28);
        box-shadow: 0 8px 40px rgba(26,26,26,0.06), inset 0 1px 0 rgba(255,255,255,0.95);
      }

      /* ── Toggle ── */
      .atema-toggle {
        width: 44px; height: 24px; border-radius: 12px;
        background: #D6BFA3; position: relative; cursor: pointer;
        transition: background 0.25s; flex-shrink: 0; border: none;
      }
      .atema-toggle::after {
        content: ''; position: absolute;
        top: 3px; right: 3px;
        width: 18px; height: 18px; border-radius: 50%;
        background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.18);
        transition: transform 0.25s;
      }
      .atema-toggle.on { background: #8C6B4F; }
      .atema-toggle.on::after { transform: translateX(-20px); }

      /* ── Ornament ── */
      .ornament {
        display: flex; align-items: center; gap: 18px;
        margin: 0 0 12px;
      }
      .ornament::before, .ornament::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140,107,79,0.4), transparent);
      }
      .ornament span {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300; font-size: 0.9rem; letter-spacing: 0.28em;
        color: #8C6B4F; white-space: nowrap; text-transform: uppercase;
      }

      /* ── Form inputs ── */
      .atema-input {
        width: 100%; background: rgba(255,255,255,0.95);
        border: 1.5px solid rgba(214,191,163,0.5);
        border-radius: 10px; padding: 11px 15px;
        font-family: 'Tajawal', sans-serif; font-size: 0.9rem;
        color: #1A1A1A; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .atema-input:focus {
        border-color: #8C6B4F;
        box-shadow: 0 0 0 3px rgba(140,107,79,0.1);
      }
      .atema-input-ltr { font-family: 'Inter', sans-serif; direction: ltr; }

      /* ── Primary button ── */
      .btn-primary {
        background: linear-gradient(135deg, #1A1A1A 0%, #2C2C2C 60%, #4A3728 100%);
        color: #E8D9C5; font-family: 'Tajawal', sans-serif;
        font-weight: 500; font-size: 0.95rem; letter-spacing: 0.04em;
        padding: 14px 32px; border-radius: 10px; border: none;
        cursor: pointer; width: 100%; transition: all 0.3s;
        box-shadow: 0 4px 20px rgba(26,26,26,0.22);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(26,26,26,0.32);
      }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      /* ── Lang toggle ── */
      .lang-toggle {
        display: flex; border: 1px solid rgba(26,26,26,0.18);
        border-radius: 20px; overflow: hidden;
        background: rgba(255,255,255,0.22);
      }
      .lang-btn {
        padding: 4px 14px; font-size: 0.72rem; cursor: pointer;
        transition: all 0.2s; font-family: 'Inter', sans-serif;
        color: rgba(26,26,26,0.5); border: none; background: transparent;
        letter-spacing: 0.08em;
      }
      .lang-btn.active {
        background: #1A1A1A; color: #E8D9C5;
        border-radius: 20px; font-weight: 500;
      }

      /* ── Sticky bar ── */
      #sticky-bar {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: linear-gradient(135deg, #1A1A1A, #2C2C2C);
        border-top: 1px solid rgba(214,191,163,0.2);
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      #sticky-bar.show { transform: translateY(0); }

      /* ── Modal ── */
      .atema-modal {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center; padding: 20px;
        opacity: 0; pointer-events: none; transition: opacity 0.3s;
        background: rgba(20,13,8,0.75); backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .atema-modal.open { opacity: 1; pointer-events: all; }
      .atema-modal-box {
        background: #FCFAF6; border-radius: 18px;
        border: 1px solid rgba(201,179,147,0.22);
        max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 32px 80px rgba(20,13,8,0.5);
        transform: scale(0.96) translateY(14px); transition: transform 0.35s;
      }
      .atema-modal.open .atema-modal-box { transform: scale(1) translateY(0); }

      /* ── WhatsApp float ── */
      .wa-float {
        position: fixed; bottom: 80px; left: 22px; z-index: 40;
        width: 52px; height: 52px; border-radius: 50%;
        background: #25D366; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 20px rgba(37,211,102,0.4);
        text-decoration: none; transition: transform 0.2s;
      }
      .wa-float:hover { transform: scale(1.1); }

      /* ── Check row ── */
      .check-row {
        display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
      }
      .check-row input[type=checkbox] {
        width: 17px; height: 17px; accent-color: #A88B5F;
        cursor: pointer; flex-shrink: 0; margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
