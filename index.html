<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/atema-studio/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATEMA STUDIO — جلسات تصوير احترافية في الجبيل</title>
    <meta name="description" content="ATEMA Studio — جلسات تصوير احترافية للأفراح والمناسبات في الجبيل والمنطقة الشرقية." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* ── ATEMA Theme Tokens (Couture Noir = default; switched by admin) ── */
      :root[data-theme="noir"] {
        --a-bg:#0B0B0B; --a-surface:#141414; --a-surface-alt:#1C1C1C; --a-ivory:#EFE3D1;
        --a-text:#D8CDB9; --a-text-soft:#9C8E76; --a-text-muted:#6B5F4E; --a-heading:#EFE3D1;
        --a-gold:#D4AF7A; --a-gold-deep:#BB864B;
        --a-border:rgba(212,175,122,0.14); --a-border-strong:rgba(212,175,122,0.35);
        --a-shadow:0 24px 64px rgba(0,0,0,0.55); --a-overlay:rgba(0,0,0,0.78);
        --a-scrollbar:#1C1C1C; --a-scrollbar-hover:#D4AF7A;
      }
      :root[data-theme="ivory"] {
        --a-bg:#F5EDE4; --a-surface:#FFFFFF; --a-surface-alt:#FBF6EE; --a-ivory:#F5EDE4;
        --a-text:#4A3728; --a-text-soft:#6B5440; --a-text-muted:#A89376; --a-heading:#1A1A1A;
        --a-gold:#8C6B4F; --a-gold-deep:#6B5440;
        --a-border:rgba(214,191,163,0.4); --a-border-strong:rgba(140,107,79,0.45);
        --a-shadow:0 18px 50px rgba(61,46,31,0.10); --a-overlay:rgba(20,13,8,0.55);
        --a-scrollbar:#D6BFA3; --a-scrollbar-hover:#8C6B4F;
      }
      :root { /* default before React mounts */
        --a-bg:#0B0B0B; --a-surface:#141414; --a-surface-alt:#1C1C1C; --a-ivory:#EFE3D1;
        --a-text:#D8CDB9; --a-text-soft:#9C8E76; --a-text-muted:#6B5F4E; --a-heading:#EFE3D1;
        --a-gold:#D4AF7A; --a-gold-deep:#BB864B;
        --a-border:rgba(212,175,122,0.14); --a-border-strong:rgba(212,175,122,0.35);
        --a-shadow:0 24px 64px rgba(0,0,0,0.55); --a-overlay:rgba(0,0,0,0.78);
        --a-scrollbar:#1C1C1C; --a-scrollbar-hover:#D4AF7A;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { margin: 0; background: var(--a-bg); color: var(--a-text); overflow-x: hidden;
             font-family: 'Montserrat', 'Tajawal', system-ui, sans-serif; font-weight: 300; }
      #root { min-height: 100vh; background: var(--a-bg); }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--a-bg); }
      ::-webkit-scrollbar-thumb { background: var(--a-scrollbar); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--a-scrollbar-hover); }

      /* ── Wordmark — Cinzel light, gold shimmer ── */
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      .atema-wordmark {
        font-family: 'Cinzel', 'Cormorant Garamond', serif;
        font-weight: 300;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        background: linear-gradient(90deg, var(--a-gold) 20%, var(--a-ivory) 45%, var(--a-gold) 70%);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 6s linear infinite;
        line-height: 1;
      }
      .atema-sub {
        font-family: 'Cinzel', 'Cormorant Garamond', serif;
        font-weight: 300;
        letter-spacing: 0.55em;
        text-transform: uppercase;
        font-size: 0.6rem;
        color: var(--a-text-soft);
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .fade-up { animation: fadeUp 0.55s ease both; }

      /* ── Package card photo area ── */
      .pkg-photo {
        width: 100%; height: 200px;
        object-fit: cover;
        filter: sepia(6%) saturate(90%) brightness(1.02);
        transition: transform 0.7s ease;
      }
      .pkg-card-wrap:hover .pkg-photo { transform: scale(1.05); }

      /* ── Pkg card hover ── */
      .pkg-card-wrap {
        transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94),
                    box-shadow 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      .pkg-card-wrap:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 56px rgba(61,46,31,0.13) !important;
      }

      /* ── Glass ── */
      .glass {
        background: linear-gradient(145deg, var(--a-surface), var(--a-surface-alt));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--a-border);
        box-shadow: var(--a-shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      /* ── Toggle ── */
      .atema-toggle {
        width: 44px; height: 24px; border-radius: 12px;
        background: var(--a-border-strong); position: relative; cursor: pointer;
        transition: background 0.25s; flex-shrink: 0; border: none;
      }
      .atema-toggle::after {
        content: ''; position: absolute;
        top: 3px; right: 3px;
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--a-ivory); box-shadow: 0 1px 4px rgba(0,0,0,0.18);
        transition: transform 0.25s;
      }
      .atema-toggle.on { background: var(--a-gold); }
      .atema-toggle.on::after { transform: translateX(-20px); }

      /* ── Ornament ── */
      .ornament {
        display: flex; align-items: center; gap: 18px;
        margin: 0 0 12px;
      }
      .ornament::before, .ornament::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, var(--a-border-strong), transparent);
      }
      .ornament span {
        font-family: 'Cinzel', 'Cormorant Garamond', serif;
        font-weight: 300; font-size: 0.9rem; letter-spacing: 0.32em;
        color: var(--a-gold); white-space: nowrap; text-transform: uppercase;
      }

      /* ── Form inputs ── */
      .atema-input {
        width: 100%; background: var(--a-surface);
        border: 1px solid var(--a-border-strong);
        border-radius: 4px; padding: 12px 16px;
        font-family: 'Montserrat', 'Tajawal', sans-serif; font-size: 0.9rem;
        font-weight: 300;
        color: var(--a-text); outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .atema-input::placeholder { color: var(--a-text-muted); }
      .atema-input:focus {
        border-color: var(--a-gold);
        box-shadow: 0 0 0 2px rgba(212,175,122,0.18);
      }
      .atema-input-ltr { font-family: 'Inter', 'Montserrat', sans-serif; direction: ltr; }

      /* ── Primary button — gold on noir, dark on ivory ── */
      .btn-primary {
        background: var(--a-gold);
        color: #0B0B0B;
        font-family: 'Cinzel', 'Tajawal', sans-serif;
        font-weight: 400; font-size: 0.84rem; letter-spacing: 0.22em;
        text-transform: uppercase;
        padding: 14px 32px; border-radius: 2px; border: 1px solid var(--a-gold);
        cursor: pointer; width: 100%; transition: all 0.3s;
        box-shadow: 0 4px 24px rgba(212,175,122,0.18);
      }
      .btn-primary:hover {
        background: var(--a-gold-deep); border-color: var(--a-gold-deep);
        transform: translateY(-1px);
        box-shadow: 0 8px 32px rgba(212,175,122,0.32);
      }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      .btn-ghost {
        background: transparent; color: var(--a-gold);
        font-family: 'Cinzel', 'Tajawal', sans-serif;
        font-weight: 400; font-size: 0.82rem; letter-spacing: 0.22em;
        text-transform: uppercase;
        padding: 13px 30px; border-radius: 2px;
        border: 1px solid var(--a-gold); cursor: pointer; transition: all 0.3s;
      }
      .btn-ghost:hover { background: var(--a-gold); color: #0B0B0B; }

      /* ── Lang toggle ── */
      .lang-toggle {
        display: flex; border: 1px solid var(--a-border-strong);
        border-radius: 20px; overflow: hidden;
        background: rgba(255,255,255,0.04);
      }
      .lang-btn {
        padding: 4px 14px; font-size: 0.7rem; cursor: pointer;
        transition: all 0.2s; font-family: 'Inter', sans-serif;
        color: var(--a-text-soft); border: none; background: transparent;
        letter-spacing: 0.1em;
      }
      .lang-btn.active {
        background: var(--a-gold); color: #0B0B0B;
        border-radius: 20px; font-weight: 500;
      }

      /* ── Sticky bar ── */
      #sticky-bar {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: var(--a-surface);
        border-top: 1px solid var(--a-border-strong);
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      #sticky-bar.show { transform: translateY(0); }

      /* ── Modal ── */
      .atema-modal {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center; padding: 20px;
        opacity: 0; pointer-events: none; transition: opacity 0.3s;
        background: var(--a-overlay); backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .atema-modal.open { opacity: 1; pointer-events: all; }
      .atema-modal-box {
        background: var(--a-surface); border-radius: 6px;
        border: 1px solid var(--a-border-strong);
        max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto;
        box-shadow: var(--a-shadow);
        transform: scale(0.96) translateY(14px); transition: transform 0.35s;
      }
      .atema-modal.open .atema-modal-box { transform: scale(1) translateY(0); }

      /* ── Editorial display utilities ── */
      .display-serif { font-family: 'Cinzel', 'Cormorant Garamond', serif; font-weight: 300; letter-spacing: 0.05em; }
      .editorial-eyebrow {
        font-family: 'Cinzel', serif; font-weight: 400;
        font-size: 0.66rem; letter-spacing: 0.4em; text-transform: uppercase;
        color: var(--a-gold);
      }

      /* ── WhatsApp float ── */
      .wa-float {
        position: fixed; bottom: 80px; left: 22px; z-index: 40;
        width: 52px; height: 52px; border-radius: 50%;
        background: #25D366; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 20px rgba(37,211,102,0.4);
        text-decoration: none; transition: transform 0.2s;
      }
      .wa-float:hover { transform: scale(1.1); }

      /* ── Check row ── */
      .check-row {
        display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
      }
      .check-row input[type=checkbox] {
        width: 17px; height: 17px; accent-color: #A88B5F;
        cursor: pointer; flex-shrink: 0; margin-top: 2px;
      }
    </style>

    <link rel="stylesheet" crossorigin href="/atema-studio/assets/index-Dkvgix3d.css">
  </head>

    <div id="root"></div>
